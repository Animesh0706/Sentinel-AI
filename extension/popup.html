<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 300px;
      font-family: system-ui, -apple-system, sans-serif;
      background: #090a0f;
      color: #e2e8f0;
      padding: 20px;
    }

    .header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 16px;
    }

    .header .shield {
      width: 28px;
      height: 28px;
      fill: none;
      stroke: #00f0ff;
      stroke-width: 2;
      filter: drop-shadow(0 0 6px rgba(0, 240, 255, 0.6));
    }

    .header h1 {
      font-size: 18px;
      font-weight: 700;
      letter-spacing: 3px;
      background: linear-gradient(90deg, #00f0ff, #b5179e);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .status {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 14px;
      background: rgba(0, 255, 102, 0.08);
      border: 1px solid rgba(0, 255, 102, 0.25);
      border-radius: 8px;
      margin-bottom: 14px;
    }

    .status .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #00ff66;
      box-shadow: 0 0 8px #00ff66;
      animation: pulse 1.5s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    .status span {
      font-size: 12px;
      font-family: monospace;
      letter-spacing: 2px;
      color: #00ff66;
    }

    .result {
      padding: 12px 14px;
      background: #11131a;
      border: 1px solid #2e303a;
      border-radius: 8px;
      margin-bottom: 14px;
      font-family: monospace;
      font-size: 12px;
      color: #9ca3af;
      min-height: 48px;
    }

    .result .verdict {
      font-size: 14px;
      font-weight: 700;
      margin-bottom: 4px;
    }

    .safe { color: #00ff66; }
    .suspicious { color: #ffcc00; }
    .malicious { color: #ff3366; text-shadow: 0 0 6px rgba(255, 51, 102, 0.5); }

    .scan-btn {
      display: block;
      width: 100%;
      padding: 10px;
      background: #00f0ff;
      color: #090a0f;
      border: none;
      border-radius: 8px;
      font-size: 13px;
      font-weight: bold;
      letter-spacing: 1px;
      cursor: pointer;
      margin-bottom: 14px;
      transition: all 0.2s;
    }

    .scan-btn:hover {
      background: #00e0ef;
      box-shadow: 0 0 10px rgba(0, 240, 255, 0.4);
    }
    .scan-btn:active {
      transform: scale(0.98);
    }

    .dashboard-link {
      display: block;
      text-align: center;
      padding: 10px;
      background: linear-gradient(135deg, rgba(0, 240, 255, 0.15), rgba(181, 23, 158, 0.15));
      border: 1px solid rgba(0, 240, 255, 0.3);
      border-radius: 8px;
      color: #00f0ff;
      text-decoration: none;
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 1px;
      transition: all 0.2s;
    }

    .dashboard-link:hover {
      background: linear-gradient(135deg, rgba(0, 240, 255, 0.25), rgba(181, 23, 158, 0.25));
      box-shadow: 0 0 15px rgba(0, 240, 255, 0.2);
    }
  </style>
</head>
<body>
  <div class="header">
    <svg class="shield" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
      <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
    </svg>
    <h1>SENTINEL AI</h1>
  </div>

  <div class="status">
    <div class="dot"></div>
    <span>MONITORING ACTIVE</span>
  </div>

  <button id="scanBtn" class="scan-btn">FORCE SCAN PAGE</button>

  <div class="result" id="lastResult">
    Waiting for scan data...
  </div>

  <a class="dashboard-link" href="http://localhost:5173" target="_blank">
    Open Dashboard →
  </a>

  <script src="popup.js"></script>
</body>
</html>
